services:
  postgres:
    image: postgres:17-alpine
    container_name: java-starter-postgres
    environment:
      POSTGRES_DB: starter
      POSTGRES_USER: starter
      POSTGRES_PASSWORD: starter
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U starter -d starter"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2026-03-27T21-04-51Z
    container_name: java-starter-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  app:
    build:
      context: .
    container_name: java-starter-app
    stop_grace_period: 30s
    environment:
      MICRONAUT_ENVIRONMENTS: ${MICRONAUT_ENVIRONMENTS:-prod}
      APP_VERSION: ${APP_VERSION:-0.1.0-SNAPSHOT}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-starter}
      DB_USER: ${DB_USER:-starter}
      DB_PASSWORD: ${DB_PASSWORD:-starter}
      STORAGE_S3_ENABLED: ${STORAGE_S3_ENABLED:-false}
      STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT:-http://minio:9000}
      STORAGE_S3_REGION: ${STORAGE_S3_REGION:-eu-central-1}
      STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET:-starter-documents}
      STORAGE_S3_PATH_STYLE_ACCESS: ${STORAGE_S3_PATH_STYLE_ACCESS:-true}
      STORAGE_S3_ACCESS_KEY: ${STORAGE_S3_ACCESS_KEY:-minioadmin}
      STORAGE_S3_SECRET_KEY: ${STORAGE_S3_SECRET_KEY:-minioadmin}
      FILE_LOGGING_ENABLED: ${FILE_LOGGING_ENABLED:-false}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health/ready | grep -q '\"status\":\"ready\"'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres-data:
  minio-data:
