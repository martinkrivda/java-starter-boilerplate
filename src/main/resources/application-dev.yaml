datasources:
  default:
    url: jdbc:h2:mem:starter-dev;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
    dialect: H2

flyway:
  datasources:
    default:
      locations:
        - classpath:db/migration/common
        - classpath:db/migration/h2

persistence:
  vendor: h2
