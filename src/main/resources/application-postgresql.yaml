persistence:
  enabled: true
  vendor: postgresql

datasources:
  default:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:starter}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:starter}
    password: ${DB_PASSWORD:starter}
    dialect: POSTGRES

flyway:
  datasources:
    default:
      locations:
        - classpath:db/migration/common
        - classpath:db/migration/postgresql

jpa:
  default:
    entity-scan:
      packages:
        - com.example.javastarterboilerplate.infrastructure.persistence
    properties:
      hibernate:
        hbm2ddl:
          auto: none
        show_sql: false
        format_sql: false
        jdbc:
          time_zone: UTC
