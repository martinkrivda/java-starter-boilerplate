persistence:
  enabled: true
  vendor: sqlserver

datasources:
  default:
    url: jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:starter};encrypt=${DB_ENCRYPT:false};trustServerCertificate=${DB_TRUST_SERVER_CERTIFICATE:true}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:Strong_Password_123}
    dialect: SQL_SERVER

flyway:
  datasources:
    default:
      locations:
        - classpath:db/migration/common
        - classpath:db/migration/sqlserver

jpa:
  default:
    entity-scan:
      packages:
        - com.example.javastarterboilerplate.infrastructure.persistence
    properties:
      hibernate:
        hbm2ddl:
          auto: none
        show_sql: false
        format_sql: false
        jdbc:
          time_zone: UTC
