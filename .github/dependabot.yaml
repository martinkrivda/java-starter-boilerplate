version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Prague
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - gradle
    groups:
      micronaut:
        patterns:
          - io.micronaut*
          - io.micronaut.*:*
      aws-sdk:
        patterns:
          - software.amazon.awssdk:*
      test-tooling:
        patterns:
          - org.junit*
          - org.mockito*
          - org.assertj*
          - com.tngtech.archunit:*

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:30"
      timezone: Europe/Prague
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
