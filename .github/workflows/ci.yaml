name: ci

on:
  push:
    branches:
      - main
      - "feature/**"
      - "bugfix/**"
      - "hotfix/**"
      - "release/**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25.0.2"

      - name: Make wrapper executable
        run: chmod +x ./gradlew

      - name: Run build
        run: ./gradlew --no-daemon clean check fatJar
