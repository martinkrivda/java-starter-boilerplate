apiVersion: v1
kind: ConfigMap
metadata:
  name: java-starter-boilerplate-config
data:
  MICRONAUT_ENVIRONMENTS: "prod,postgresql"
  APP_NAME: "java-starter-boilerplate"
  APP_VERSION: "0.1.0-SNAPSHOT"
  APP_DESCRIPTION: "Micronaut starter for document sealing and signing services"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "starter"
  DB_POOL_MAX_SIZE: "10"
  STORAGE_S3_ENABLED: "true"
  STORAGE_S3_ENDPOINT: "http://minio:9000"
  STORAGE_S3_REGION: "eu-central-1"
  STORAGE_S3_BUCKET: "starter-documents"
  STORAGE_S3_PATH_STYLE_ACCESS: "true"
  PDFBOX_ENABLED: "true"
  DSS_ENABLED: "true"
  FILE_LOGGING_ENABLED: "false"
  LOG_LEVEL: "INFO"
