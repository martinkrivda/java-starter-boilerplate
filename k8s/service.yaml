apiVersion: v1
kind: Service
metadata:
  name: java-starter-boilerplate
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
spec:
  selector:
    app: java-starter-boilerplate
  ports:
    - name: http
      port: 80
      targetPort: 8080
